<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Know Me | דע - אותי</title>
    
    <style>
        /* CSS Variables for easy theme management */
        :root {
            --bg: #1a1a1a;
            --card: #2d2d2d;
            --accent: #ff4d6d;
            --text: #f0f0f0;
            --shot-color: #ffd166;
        }

        /* Essential mobile viewport setup */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            height: 100dvh; 
            margin: 0;
            padding: env(safe-area-inset-top) 10px env(safe-area-inset-bottom) 10px;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Menu Screen Styles */
        #menuScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            flex-grow: 1;
        }

        .menu-title {
            color: var(--accent);
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
        }

        .category-btn {
            width: 80%;
            max-width: 300px;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid var(--accent);
            background: transparent;
            color: var(--text);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-btn:active {
            background: var(--accent);
            transform: scale(0.95);
        }

        /* Game Screen Styles (Hidden by default) */
        #gameScreen {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            flex-grow: 1;
        }

        /* Shot Counter Components */
        .shot-counter {
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 15px;
            border-radius: 12px;
            width: 100%;
            max-width: 380px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            height: 50px;
        }

        .player-top { transform: rotate(180deg); }
        .shot-display { font-size: 1.2rem; letter-spacing: 2px; }
        .shot-glass { opacity: 0.2; transition: all 0.3s ease; }
        .shot-glass.filled { opacity: 1; filter: drop-shadow(0 0 5px var(--shot-color)); }

        .group-label {
            font-size: 0.8rem;
            color: #aaa;
            position: absolute;
            margin-top: -35px;
        }

        /* Game Area Elements */
        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            gap: 15px;
        }

        h1 { color: var(--accent); margin: 0; font-size: 1.6rem; }
        .dice-roll { font-size: 2.8rem; line-height: 1; }
        .category-badge { padding: 5px 15px; border-radius: 20px; font-weight: bold; background: var(--accent); font-size: 0.85rem; }
        
        .question-card {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            min-height: 140px;
            width: 90%;
            max-width: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            text-align: center;
            border: 1px solid #444;
            box-sizing: border-box;
        }

        /* Buttons */
        .btn-main {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.1rem;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.3);
            cursor: pointer;
        }

        .btn-back {
            background: transparent;
            color: #888;
            border: none;
            margin-top: 10px;
            text-decoration: underline;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .btn-shot { background: var(--shot-color); border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; color: #1a1a1a; }
        .shot-msg { color: var(--shot-color); font-weight: bold; font-size: 1.5rem; }
    </style>
</head>
<body>

    <div id="menuScreen">
        <div class="menu-title">Know Me</div>
        <button class="category-btn" onclick="startGame('couples')">זוגות 🤍</button>
        <button class="category-btn" onclick="startGame('friends')">חברים 🍻</button>
        <button class="category-btn" onclick="startGame('family')" style="border-color: #4da6ff;">הורה וילד 👨‍👧</button>
    </div>

    <div id="gameScreen">
        <div class="shot-counter player-top" id="topShotCounter">
            <button class="btn-shot" onclick="addShot(2)">+</button>
            <div id="shots-p2" class="shot-display"></div>
            <button class="btn-shot" onclick="resetShots(2)">↺</button>
        </div>

        <div class="container">
            <h1 id="gameTitle">דע - אותי</h1>
            <div id="diceDisplay" class="dice-roll">🎲</div>
            <div id="categoryDisplay" class="category-badge">לחצו להתחלה</div>
            <div id="questionDisplay" class="question-card">מוכנים?</div>
            <button class="btn-main" onclick="play()">הטל קובייה!</button>
            <button class="btn-back" onclick="showMenu()">חזרה לתפריט</button>
        </div>

        <div class="shot-counter" id="bottomShotCounter">
            <button class="btn-shot" onclick="addShot(1)">+</button>
            <div id="shots-p1" class="shot-display"></div>
            <button class="btn-shot" onclick="resetShots(1)">↺</button>
        </div>

        <div class="shot-counter" id="groupShotCounter" style="display: none; justify-content: center; gap: 20px;">
            <span class="group-label">סופר קבוצתי</span>
            <button class="btn-shot" onclick="addShot('group')">+</button>
            <div id="shots-pgroup" class="shot-display"></div>
            <button class="btn-shot" onclick="resetShots('group')">↺</button>
        </div>
    </div>

            title: "הורה וילד", 
            questions: [
                "מהו הדבר שאתה הכי אוהב שאנחנו עושים ביחד?", "אם היית יכול לשנות חוק אחד בבית, מה הוא היה?", "מה הדבר שגורם לך להרגיש הכי אהוב על ידי?", "מתי בפעם האחרונה הרגשת שממש הצלחת במשהו והיית גאה בעצמך?", "מהו הזיכרון הכי מצחיק שיש לנו ביחד כמשפחה?", "אם היינו יכולים לצאת להרפתקה בכל מקום בעולם, לאן היית רוצה שנסע?", "איזה 'כוח על' היית נותן לי? ואיזה 'כוח על' היית רוצה לעצמך?", "מהו הדבר שהכי מפחיד אותך, ואיך אני יכול לעזור לך להרגיש בטוח יותר?", "מהו הסיפור האהוב עליך מהזמן שהיית קטן (או מהזמן שאני הייתי קטנה)?", "אם היינו מחליפים תפקידים ליום אחד, מה הדבר הראשון שהיית עושה בתור ההורה?", "מהו הדבר שאתה הכי גאה בו באופי שלך?", "מהו המקום שבו אתה מרגיש הכי בטוח ורגוע בעולם?", "מהו הדבר שאתה הכי אוהב ללמוד או לעשות בזמנך החופשי?", "אם היית יכול לבקש משאלה אחת עבור המשפחה שלנו, מה היא הייתה?", "מהו הדבר שאתה חושב שאני לא מבין לגביך מספיק טוב והיית רוצה שאדע?", "מהו הדבר הכי חשוב שלמדת ממני? ומה לדעתך אני למדתי ממך?", "איזה חלום היית רוצה שנגשים ביחד השנה?", "מה גורם לך להרגיש שאתה באמת 'אתה' כשאתה איתי?", "אם היית יכול להמציא מסורת משפחתית חדשה, מה היא הייתה?", "מהו הדבר שאתה הכי מחכה לו כשאתה חוזר הביתה בסוף היום?"
            ] 
        }
    };

    // State Variables
    let currentMode = null;
    let usedQuestions = {}; // Will be initialized dynamically based on the selected mode
    const diceIcons = ["", "⚀", "⚁", "⚂", "⚃", "⚄", "⚅"];
    // Added 'group' for the Friends mode general counter
    let scores = { 1: 0, 2: 0, group: 0 };
    const maxShots = 5;

    // Transition from Menu to Game Screen
    function startGame(mode) {
        currentMode = mode;
        
        // Hide Menu, Show Game
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        
        // Setup UI based on mode
        const categoryDisplay = document.getElementById('categoryDisplay');
        const topShot = document.getElementById('topShotCounter');
        const bottomShot = document.getElementById('bottomShotCounter');
        const groupShot = document.getElementById('groupShotCounter');

        if (mode === 'family') {
            categoryDisplay.innerText = questionsDB.family.title;
            categoryDisplay.style.background = "#4da6ff"; // Blueish for family
            // Hide all shot counters for Family mode
            topShot.style.display = 'none';
            bottomShot.style.display = 'none';
            groupShot.style.display = 'none';
            
            usedQuestions.family = [];
            
        } else if (mode === 'friends') {
            categoryDisplay.innerText = questionsDB.friends.title;
            categoryDisplay.style.background = "#ff4d6d";
            // Show only the general group counter
            topShot.style.display = 'none';
            bottomShot.style.display = 'none';
            groupShot.style.display = 'flex';
            
            usedQuestions.friends = [];
            
        } else if (mode === 'couples') {
            categoryDisplay.innerText = "משחק זוגי";
            categoryDisplay.style.background = "#ff4d6d";
            // Show player 1 and 2 counters
            topShot.style.display = 'flex';
            bottomShot.style.display = 'flex';
            groupShot.style.display = 'none';
            
            // Initialize memory for the 4 sub-categories
            usedQuestions = { 1: [], 2: [], 3: [], 4: [] };
        }

        document.getElementById('questionDisplay').innerText = "מוכנים?";
    }

    // Return to Menu
    function showMenu() {
        document.getElementById('menuScreen').style.display = 'flex';
        document.getElementById('gameScreen').style.display = 'none';
        // Reset all shots when returning to menu
        resetShots(1);
        resetShots(2);
        resetShots('group');
    }

    // Update the visual representation of the shot glasses
    function updateShotUI(player) {
        const container = document.getElementById(`shots-p${player}`);
        let html = "";
        for (let i = 1; i <= maxShots; i++) {
            const filledClass = i <= scores[player] ? "filled" : "";
            html += `<span class="shot-glass ${filledClass}">🥃</span>`;
        }
        container.innerHTML = html;
    }

    // Increment shot counter for a player or group
    function addShot(player) {
        if (scores[player] < maxShots) {
            scores[player]++;
            updateShotUI(player);
        }
    }

    // Reset shot counter for a player or group
    function resetShots(player) {
        scores[player] = 0;
        updateShotUI(player);
    }

    // Initial render of shot counters
    updateShotUI(1);
    updateShotUI(2);
    updateShotUI('group');

    // Main Game Logic: Triggered when "Roll Dice" button is clicked
    function play() {
        const roll = Math.floor(Math.random() * 6) + 1;
        document.getElementById('diceDisplay').innerText = diceIcons[roll];
        
        const qDisplay = document.getElementById('questionDisplay');
        const cDisplay = document.getElementById('categoryDisplay');

        // Logic for "Family" Mode (No shots allowed)
        if (currentMode === 'family') {
            handleSingleArrayMode('family', questionsDB.family, qDisplay, cDisplay, "#4da6ff");
            return;
        }

        // Logic for "Friends" Mode
        if (currentMode === 'friends') {
            if (roll === 6) {
                showShotScreen(qDisplay, cDisplay);
            } else {
                handleSingleArrayMode('friends', questionsDB.friends, qDisplay, cDisplay, "#ff4d6d");
            }
            return;
        }

        // Logic for "Couples" Mode (Uses sub-categories based on dice roll)
        if (currentMode === 'couples') {
            if (roll >= 5) {
                showShotScreen(qDisplay, cDisplay);
            } else {
                const subCategory = questionsDB.couples[roll];
                
                // Reset used memory if all questions in this sub-category are used
                if (usedQuestions[roll].length === subCategory.questions.length) {
                    usedQuestions[roll] = [];
                }

                // Pick a random question that hasn't been asked yet
                let randomIndex;
                do {
                    randomIndex = Math.floor(Math.random() * subCategory.questions.length);
                } while (usedQuestions[roll].includes(randomIndex));

                // Save question as used
                usedQuestions[roll].push(randomIndex);
                
                // Update UI
                cDisplay.innerText = subCategory.title;
                cDisplay.style.background = "#ff4d6d";
                qDisplay.innerText = subCategory.questions[randomIndex];
            }
        }
    }

    // Helper function for rendering a Shot screen
    function showShotScreen(qDisplay, cDisplay) {
        cDisplay.innerText = "זמן לשוט! 🥃";
        cDisplay.style.background = "#ffd166"; 
        qDisplay.innerHTML = "<span class='shot-msg'>שותים שוט! 🥃</span>";
    }

    // Helper function for picking a question from a single flat array (Friends/Family)
    function handleSingleArrayMode(modeKey, dataObject, qDisplay, cDisplay, color) {
        // Reset memory if all questions used
        if (usedQuestions[modeKey].length === dataObject.questions.length) {
            usedQuestions[modeKey] = [];
        }

        // Pick a random unasked question
        let randomIndex;
        do {
            randomIndex = Math.floor(Math.random() * dataObject.questions.length);
        } while (usedQuestions[modeKey].includes(randomIndex));

        usedQuestions[modeKey].push(randomIndex);
        
        // Update UI
        cDisplay.innerText = dataObject.title;
        cDisplay.style.background = color;
        qDisplay.innerText = dataObject.questions[randomIndex];
    }
</script>
</body>
</html>
