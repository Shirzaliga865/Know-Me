<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Know Me | דע - אותי</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Variables - Calm Bottle Green Boho Palette */
        :root {
            --bg: #2C4236;          /* Calm bottle green */
            --card: #FDFBF7;        /* Soft off-white for cards to pop */
            --text-dark: #1E2D26;   /* Dark green/gray for text on cards */
            --text-light: #E8EDE9;  /* Light text for titles on dark bg */
            --shadow: rgba(0, 0, 0, 0.2); 
            
            /* Dynamic Accent Color (Changes via JS) */
            --accent: #C87971;      
            
            /* Category Colors */
            --color-couples: #C87971; /* Terracotta / Rose */
            --color-friends: #D4A373; /* Warm Sand / Mustard */
            --color-family: #8A9A86;  /* Sage Green */
            --color-shot: #E2B464;    /* Soft Gold */
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            height: 100dvh; 
            margin: 0;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: manipulation;
        }

        /* Menu Screen Styles */
        #menuScreen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            flex-grow: 1;
        }

        .menu-title {
            color: var(--text-light);
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .category-btn {
            position: relative;
            width: 85%;
            max-width: 320px;
            padding: 18px 25px;
            border-radius: 20px;
            border: none;
            background: var(--card);
            color: var(--text-dark);
            font-size: 1.4rem;
            font-weight: 800;
            font-family: inherit;
            cursor: pointer;
            box-shadow: 0 8px 20px var(--shadow);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .category-btn:active {
            transform: scale(0.96);
            box-shadow: 0 4px 10px var(--shadow);
        }

        .indicator {
            position: absolute;
            left: 20px; 
            width: 14px;
            height: 14px;
            border-radius: 50%;
        }

        /* Game Screen Styles */
        #gameScreen {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            flex-grow: 1;
        }

        /* Shot Counter Components */
        .shot-counter {
            background: var(--card);
            color: var(--text-dark);
            padding: 8px 15px;
            border-radius: 20px;
            width: 90%;
            max-width: 380px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
            height: 55px;
            box-shadow: 0 4px 15px var(--shadow);
        }

        .player-top { transform: rotate(180deg); }
        .shot-display { font-size: 1.3rem; letter-spacing: 5px; }
        .shot-glass { opacity: 0.15; transition: all 0.3s ease; filter: grayscale(100%); }
        .shot-glass.filled { opacity: 1; filter: grayscale(0%); }

        /* Group Shot Counter */
        .shot-number-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 2rem;
            font-weight: 800;
            color: var(--color-shot);
        }

        /* Game Area Elements */
        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            gap: 20px;
        }

        h1 { margin: 0; font-size: 2rem; font-weight: 800; letter-spacing: 1px; }
        
        /* Realistic CSS Dice */
        .dice-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
            border-radius: 18px;
            /* Creates the 3D realistic look */
            box-shadow: inset -3px -3px 6px rgba(0,0,0,0.1), 
                        inset 3px 3px 6px rgba(255,255,255,0.8), 
                        0 10px 20px rgba(0,0,0,0.3);
            position: relative;
            display: inline-block;
        }

        .dice-dot {
            position: absolute;
            width: 16px;
            height: 16px;
            background-color: #2a2a2a;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            /* Indented dot effect */
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5), 0 1px 1px rgba(255,255,255,0.8);
        }
        
        /* Dice Spin Animation */
        .spin-anim {
            animation: rollDice 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes rollDice {
            0% { transform: rotate(0deg) scale(0.8); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }
        
        .category-badge { 
            padding: 6px 20px; 
            border-radius: 30px; 
            font-weight: 600; 
            background: var(--accent); 
            color: white;
            font-size: 1.1rem; 
            transition: background-color 0.3s ease;
        }
        
        .question-card {
            background: var(--card);
            color: var(--text-dark);
            padding: 30px 25px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            min-height: 160px;
            width: 90%;
            max-width: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            text-align: center;
            font-weight: 600;
            line-height: 1.4;
            box-sizing: border-box;
        }

        /* Buttons */
        .btn-main {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px 45px;
            font-size: 1.3rem;
            border-radius: 50px;
            font-weight: 800;
            font-family: inherit;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-main:active {
            transform: scale(0.92);
        }

        .btn-back {
            background: transparent;
            color: var(--text-light);
            border: none;
            margin-top: 5px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            opacity: 0.8;
        }

        .btn-shot { 
            background: transparent; 
            color: var(--text-dark);
            border: none; 
            width: 35px; 
            height: 35px; 
            font-weight: 800; 
            font-size: 1.5rem;
            cursor: pointer; 
        }
        
        .shot-msg { color: var(--color-shot); font-weight: 800; font-size: 1.8rem; }
    </style>
</head>
<body>

    <div id="menuScreen">
        <div class="menu-title">Know Me</div>
        
        <button class="category-btn" onclick="startGame('couples')">
            <span>זוגות ❤️</span>
            <span class="indicator" style="background: var(--color-couples);"></span>
        </button>
        
        <button class="category-btn" onclick="startGame('friends')">
            <span>חברים 🍻</span>
            <span class="indicator" style="background: var(--color-friends);"></span>
        </button>
        
        <button class="category-btn" onclick="startGame('family')">
            <span>הורה וילד 👨‍👧</span>
            <span class="indicator" style="background: var(--color-family);"></span>
        </button>
    </div>

    <div id="gameScreen">
        <div class="shot-counter player-top" id="topShotCounter">
            <button class="btn-shot" onclick="addShot(2)">+</button>
            <div id="shots-p2" class="shot-display"></div>
            <button class="btn-shot" onclick="resetShots(2)">↺</button>
        </div>

        <div class="container">
            <h1 id="gameTitle">דע - אותי</h1>
            
            <div id="diceDisplay" class="dice-container">
                </div>
            
            <div id="categoryDisplay" class="category-badge">לחצו להתחלה</div>
            <div id="questionDisplay" class="question-card">מוכנים לגלות?</div>
            <button class="btn-main" id="mainActionBtn" onclick="play()">הטל קובייה!</button>
            <button class="btn-back" onclick="showMenu()">חזרה לתפריט</button>
        </div>

        <div class="shot-counter" id="bottomShotCounter">
            <button class="btn-shot" onclick="addShot(1)">+</button>
            <div id="shots-p1" class="shot-display"></div>
            <button class="btn-shot" onclick="resetShots(1)">↺</button>
        </div>

        <div class="shot-counter" id="groupShotCounter" style="display: none; justify-content: space-between;">
            <button class="btn-shot" onclick="addShot('group')">+</button>
            <div class="shot-number-wrapper">
                🥃 <span id="shots-pgroup">0</span> 🥃
            </div>
            <button class="btn-shot" onclick="resetShots('group')">↺</button>
        </div>
    </div>

<script>
    const questionsDB = {
        couples: {
            1: { 
                title: "הכרות עמוקה", 
                questions: ["מהי התכונה שהכי קשה לך לקבל באנשים אחרים?", "מה גורם לך להרגיש חיים באמת?", "מה ההרגל הכי מוזר שלך שלא הרבה יודעים עליו?", "מה היא שפת האהבה שלך?", "אילו דברים קטנים משפרים את מצב הרוח שלך?", "מה ההרגל הכי גרוע שלך?", "מה עוזר לך להרגע כשאתה לחוץ?", "מה הדבר שאתה מחכה לו כל יום?", "מה הדבר שאתה היית מקווה להיות טוב בו?", "מהו נושא שאתה מרגיש שהוא 'חור בהשכלה' אצלך והיית רוצה ללמוד?", "מה הדבר הכי מוזר שאתה מאמין בו (אפילו קצת)?", "מהו הדבר שגורם לך להרגיש הכי 'בבית' (זה יכול להיות ריח, מקום או אדם)?", "איזו תכונה אצלך אנשים נוטים לפרש לא נכון בדרך כלל?", "מהו הדבר שהכי קשה לך לסלוח עליו?", "מהו הפחד הכי לא רציונלי שלך?", "איזה נושא בעולם יכול לגרום לך לדבר במשך שעות בלי להשתעמם?", "מהו הדבר שאתה הכי מפחד לאבד בחיים שלך?", "על מה בחיים שלך אתה מרגיש שאתה מבזבז יותר מדי זמן, למרות שאתה יודע את זה?", "באיזו סיטואציה בחיים הרגשת הכי אמיץ?", "באיזו סיטואציה בחיים הרגשת הכי 'לא שייך'?", "אם היית פוגש את אלוהים, מה הדבר הראשון שהיית שואל/אומר לו?", "האם אתה מאמין שלכל דבר שקורה יש סיבה, או שהכל מקרי?", "לדעת את האמת הכואבת או לחיות בשקר מאושר?", "מהי ה'מסכה' הכי נפוצה שאתה עוטה כשאתה פוגש אנשים חדשים?", "מה הדבר שהכי מרגש אותך לגבי העתיד שלך?", "האם אתה מאמין בנשמות תאומות, או שאהבה היא עבודה קשה ובחירה יומיומית?", "אם היית יכול לראות סטטיסטיקה אחת על החיים שלך כשייגמרו, מה היית בוחר לראות?", "איזה חבר מהעבר שלך היית רוצה לחזור להיות חבר שלו בהווה?", "מה גורם לך להרגיש שאתה באמת מצליח בחיים?", "אם היית יכול להיות כרגע בכל מקום בעולם, איפה היית רוצה להיות?", "אם היית צריך לבחור לעצמך שם אחר חדש, מה הוא היה?", "מה הדבר הכי חשוב שלמדת על עצמך בשנה האחרונה?", "אם לא היו מגבלות של זמן, כסף או פחד, מה היית עושה עכשיו?"] 
            },
            2: { 
                title: "מסע בזמן", 
                questions: ["אילו פצעים מהעבר שלך עדיין משפיעים עליך?", "מי השפיע עליך בצורה הכי משמעותית בחיים, ואיך?", "מהו זיכרון הילדות האהוב עליך?", "מה הדבר הכי מביך שקרה לך?", "מה הדבר הכי טוב שקרה לך עד כה בחיים?", "אם היית יכול לשנות דבר אחד בדרך שבה גידלו אותך, מה זה היה?", "מהו ההישג שאתה הכי גאה בו, שלא מופיע בקורות החיים שלך?", "מהי המחמאה הכי יפה שקיבלת אי פעם?", "מהי הטעות הכי 'טובה' שעשית בחיים – כזו שבזמנו נראתה כמו כישלון אבל הובילה אותך למקום מעולה?", "אם היית יכול לחזור בזמן ולתת לעצמך בגיל 20 עצה אחת, מה היית אומר?", "מהו הדבר שאתה עושה היום שאותו ילד שהיית היה הכי גאה בה? ולמה?"] 
            },
            3: { 
                title: "הקשר שלנו", 
                questions: ["מה היית רוצה שישאלו אותך?", "מה הדבר שאני עושה שגורם לך להרגיש אהוב?", "מה הדבר שאתה הכי הרבה מעריך בי?", "איזה הרפתקאה היית רוצה שנעשה יחד?", "מה הרושם הראשוני שהיה לך עלי כשנפגשנו?", "מה המקום שהיית הכי רוצה שנבקר בו?", "מה ה'דגל הירוק' הכי משמעותי עבורך אצל אנשים?", "איזו תכונה שלי היית רוצה 'לאמץ' לעצמך?", "מהו הדבר שהכי הופתעת לגלות עלי מאז שנפגשנו?", "מהו הרגע שבו הרגשת הכי קרוב אלי עד עכשיו?", "אם היינו צריכים להגדיר 'חוק' אחד לקשר שלנו, מה הוא היה?", "מהו הדבר שאתה חושב שאני הכי לא מבינה לגביך?", "מה הדבר שגורם לך להרגיש הכי בטוח איתי?"] 
            },
            4: { 
                title: "מיניות", 
                questions: ["ספר על פנטזיה מינית שיש לך", "מהו הדבר שהכי 'מדליק' (Turn-on) אותך אצל הצד השני ברגע הראשון?", "מה החלק שאתה הכי אוהב בגוף שלך? ובגוף שלי?", "מה המחשבה הכי פרועה שעברה לך בראש לגבינו לאחרונה?", "איך אתה מעדיף שייזמו איתך – במגע ישיר, במילים או ברמזים?", "תתאר לי במילים (בלי לגעת) בדיוק מה היית רוצה לעשות לי עכשיו אם היינו לבד לגמרי", "מהי התנוחה האהובה עליך ולמה?", "איך נראה ה'לפני' (Foreplay) האידיאלי מבחינתך? כמה זמן הוא צריך להימשך?", "מהי דעתך על שימוש באביזרים או בצעצועים בתוך הקשר?", "איפה המקום הכי 'נועז' שבו היית רוצה לעשות סקס?", "מהו הדבר שהכי מוריד לך (Turn-off) במיטה?", "מה עוזר לך להיכנס ל'מוד' (לאווירה) כשאתה לא שם?", "מעדיף לשכב (סקס) בחושך או באור?", "אתה מעדיף להיות השולט או הנשלט?", "בוקר או לילה?", "מהיר וחזק או איטי ומתמשך?", "למעלה או למטה?", "עירום מלא או עם הלבשה תחתונה סקסית?", "ספונטני על הספה או מתוכנן במיטה?", "איפה הכי היית רוצה שאני אנשק אותך עכשיו?", "סקס עם גרביים? כן או לא?", "איך אתה מרגיש לגבי משחקי תפקידים?", "אם היית יכול לבחור מקום ציבורי אחד שבו היינו יכולים לעשות 'משהו' בלי שיתפסו אותנו, איפה זה היה?"] 
            }
        },
        friends: { 
            title: "זמן עם החבר'ה", 
            questions: ["מה ההרגל הכי מוזר שלך שלא הרבה יודעים עליו?", "מה הדבר הכי מביך שקרה לך?", "אם היית צריך לבחור לעצמך שם אחר חדש, מה הוא היה?", "מהו נושא שאתה מרגיש שהוא 'חור בהשכלה' אצלך והיית רוצה ללמוד?", "מה הדבר הכי מוזר שאתה מאמין בו (אפילו קצת)?", "מהו הפחד הכי לא רציונלי שלך?", "מהו הכישרון הכי חסר תועלת שיש לך?", "מהו הדבר הכי מטופש שהאמנת בו בתור ילד/ה?", "אם היית דמות בסיטקום, איזו דמות היית?", "מהי הדעה הכי לא פופולרית שלך?", "מהי הרכישה הכי מיותרת שביצעת בחיים שלך?", "אם היית חייב להשתתף בתוכנית ריאליטי, איזו תוכנית זו הייתה?", "איזה נושא בעולם יכול לגרום לך לדבר במשך שעות בלי להשתעמם?", "על מה בחיים שלך אתה מרגיש שאתה מבזבז יותר מדי זמן, למרות שאתה יודע את זה?", "האם אתה מאמין שלכל דבר שקורה יש סיבה, או שהכל מקרי?", "לדעת את האמת הכואבת או לחיות בשקר מאושר?", "איזו תכונה אצלך אנשים נוטים לפרש לא נכון בדרך כלל?", "מהי ה'מסכה' הכי נפוצה שאתה עוטה כשאתה פוגש אנשים חדשים?", "מהי העצה הכי טובה שקיבלת אי פעם?", "זמן או כסף: מה יותר חשוב לך בנקודת הזמן הנוכחית בחיים?", "מהי הנורמה החברתית שאתה חושב שהיא הכי מיותרת?", "אם היית יכול לשנות חוק פיזיקלי אחד בעולם, מה הוא היה?", "מה הדבר הראשון שאתה עושה כשאתה קם בבוקר (באמת)?", "אם היית יכול לראות סטטיסטיקה אחת על החיים שלך כשייגמרו, מה היית בוחר לראות?", "מהו ההישג שאתה הכי גאה בו, שלא מופיע בקורות החיים שלך?", "מהי הטעות הכי 'טובה' שעשית בחיים – כזו שבזמנו נראתה כמו כישלון אבל הובילה אותך למקום מעולה?", "אם היית יכול לחזור בזמן ולתת לעצמך בגיל 20 עצה אחת, מה היית אומר?", "אם היית יכול להיות כרגע בכל מקום בעולם, איפה היית רוצה להיות?", "אם היית יכול לאכול ארוחת ערב עם כל אדם (חי או מת), מי זה היה?", "מהו הדבר שפעם התביישת בו והיום אתה גאה בו?", "מהו המקום הכי רחוק שהגעת אליו (פיזית או נפשית) ושינה אותך?", "מהו 'הדבר הגדול הבא' שאתה רוצה להשיג בחיים?", "מהי התכונה שאתה הכי מעריך אצל ההורים שלך והיית רוצה לאמץ?", "איזה סרט או ספר גרם לך לשנות את כל התפיסה שלך על נושא מסוים?", "מהו הדבר הכי משמעותי שקרה לך בחיים לגמרי במקרה?", "מהי ה'פדיחה' הכי גדולה שקרתה לך בדייט ראשון?", "מהי המתנה הכי טובה שקיבלת אי פעם?", "מהו הדבר שעשית בחיים שאתה בטוח שתספר עליו לנכדים שלך ביום מן הימים?", "מהי התכונה שאתה הכי אוהב בעצמך, אבל כמעט אף פעם לא מקבל עליה מחמאה?", "מהו הרגע בחיים שבו הרגשת שבאמת 'גדלת' והפכת למבוגר?"] 
        },
        family: { 
            title: "הורה וילד", 
            questions: ["מהו הדבר שאתה הכי אוהב שאנחנו עושים ביחד?", "אם היית יכול לשנות חוק אחד בבית, מה הוא היה?", "מה הדבר שגורם לך להרגיש הכי אהוב על ידי?", "מתי בפעם האחרונה הרגשת שממש הצלחת במשהו והיית גאה בעצמך?", "מהו הזיכרון הכי מצחיק שיש לנו ביחד כמשפחה?", "אם היינו יכולים לצאת להרפתקה בכל מקום בעולם, לאן היית רוצה שנסע?", "איזה 'כוח על' היית נותן לי? ואיזה 'כוח על' היית רוצה לעצמך?", "מהו הדבר שהכי מפחיד אותך, ואיך אני יכול לעזור לך להרגיש בטוח יותר?", "מהו הסיפור האהוב עליך מהזמן שהיית קטן (או מהזמן שאני הייתי קטנה)?", "אם היינו מחליפים תפקידים ליום אחד, מה הדבר הראשון שהיית עושה בתור ההורה?", "מהו הדבר שאתה הכי גאה בו באופי שלך?", "מהו המקום שבו אתה מרגיש הכי בטוח ורגוע בעולם?", "מהו הדבר שאתה הכי אוהב ללמוד או לעשות בזמנך החופשי?", "אם היית יכול לבקש משאלה אחת עבור המשפחה שלנו, מה היא הייתה?", "מהו הדבר שאתה חושב שאני לא מבין לגביך מספיק טוב והיית רוצה שאדע?", "מהו הדבר הכי חשוב שלמדת ממני? ומה לדעתך אני למדתי ממך?", "איזה חלום היית רוצה שנגשים ביחד השנה?", "מה גורם לך להרגיש שאתה באמת 'אתה' כשאתה איתי?", "אם היית יכול להמציא מסורת משפחתית חדשה, מה היא הייתה?", "מהו הדבר שאתה הכי מחכה לו כשאתה חוזר הביתה בסוף היום?"] 
        }
    };

    let currentMode = null;
    let usedQuestions = {}; 
    let scores = { 1: 0, 2: 0, group: 0 };
    const maxShots = 5;

    // Generates the HTML for the realistic CSS dice dots
    function renderDiceFace(roll) {
        const positions = {
            1: ['50%,50%'],
            2: ['25%,25%', '75%,75%'],
            3: ['25%,25%', '50%,50%', '75%,75%'],
            4: ['25%,25%', '25%,75%', '75%,25%', '75%,75%'],
            5: ['25%,25%', '25%,75%', '50%,50%', '75%,25%', '75%,75%'],
            6: ['25%,20%', '25%,50%', '25%,80%', '75%,20%', '75%,50%', '75%,80%']
        };
        
        let dotsHTML = '';
        positions[roll].forEach(pos => {
            const [left, top] = pos.split(',');
            dotsHTML += `<div class="dice-dot" style="left: ${left}; top: ${top};"></div>`;
        });
        
        document.getElementById('diceDisplay').innerHTML = dotsHTML;
    }

    // Set default dice face to 6 on load
    renderDiceFace(6);

    function startGame(mode) {
        currentMode = mode;
        
        document.getElementById('menuScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'flex';
        
        const categoryDisplay = document.getElementById('categoryDisplay');
        const topShot = document.getElementById('topShotCounter');
        const bottomShot = document.getElementById('bottomShotCounter');
        const groupShot = document.getElementById('groupShotCounter');

        if (mode === 'family') {
            document.documentElement.style.setProperty('--accent', 'var(--color-family)');
            categoryDisplay.innerText = questionsDB.family.title;
            topShot.style.display = 'none';
            bottomShot.style.display = 'none';
            groupShot.style.display = 'none';
            usedQuestions.family = [];
            
        } else if (mode === 'friends') {
            document.documentElement.style.setProperty('--accent', 'var(--color-friends)');
            categoryDisplay.innerText = questionsDB.friends.title;
            topShot.style.display = 'none';
            bottomShot.style.display = 'none';
            groupShot.style.display = 'flex';
            usedQuestions.friends = [];
            
        } else if (mode === 'couples') {
            document.documentElement.style.setProperty('--accent', 'var(--color-couples)');
            categoryDisplay.innerText = "משחק זוגי";
            topShot.style.display = 'flex';
            bottomShot.style.display = 'flex';
            groupShot.style.display = 'none';
            usedQuestions = { 1: [], 2: [], 3: [], 4: [] };
        }

        document.getElementById('questionDisplay').innerText = "מוכנים לגלות?";
        renderDiceFace(6); // Reset dice visual
    }

    function showMenu() {
        document.getElementById('menuScreen').style.display = 'flex';
        document.getElementById('gameScreen').style.display = 'none';
        resetShots(1);
        resetShots(2);
        resetShots('group');
    }

    function updateShotUI(player) {
        const container = document.getElementById(`shots-p${player}`);
        let html = "";
        for (let i = 1; i <= maxShots; i++) {
            const filledClass = i <= scores[player] ? "filled" : "";
            html += `<span class="shot-glass ${filledClass}">🥃</span>`;
        }
        container.innerHTML = html;
    }

    function addShot(player) {
        if (player === 'group') {
            scores[player]++;
            document.getElementById('shots-pgroup').innerText = scores[player];
        } else if (scores[player] < maxShots) {
            scores[player]++;
            updateShotUI(player);
        }
    }

    function resetShots(player) {
        scores[player] = 0;
        if (player === 'group') {
            document.getElementById('shots-pgroup').innerText = "0";
        } else {
            updateShotUI(player);
        }
    }

    updateShotUI(1);
    updateShotUI(2);
    document.getElementById('shots-pgroup').innerText = "0";

    function play() {
        const diceDisplay = document.getElementById('diceDisplay');
        
        // Remove animation class and trigger reflow to restart it
        diceDisplay.classList.remove('spin-anim');
        void diceDisplay.offsetWidth;
        diceDisplay.classList.add('spin-anim');

        const roll = Math.floor(Math.random() * 6) + 1;
        
        // Change the dice face and text halfway through the animation
        setTimeout(() => {
            renderDiceFace(roll);
            
            const qDisplay = document.getElementById('questionDisplay');
            const cDisplay = document.getElementById('categoryDisplay');

            if (currentMode === 'family') {
                handleSingleArrayMode('family', questionsDB.family, qDisplay, cDisplay, "var(--color-family)");
                return;
            }

            if (currentMode === 'friends') {
                if (roll === 6) {
                    showShotScreen(qDisplay, cDisplay);
                } else {
                    handleSingleArrayMode('friends', questionsDB.friends, qDisplay, cDisplay, "var(--color-friends)");
                }
                return;
            }

            if (currentMode === 'couples') {
                if (roll >= 5) {
                    showShotScreen(qDisplay, cDisplay);
                } else {
                    const subCategory = questionsDB.couples[roll];
                    
                    if (usedQuestions[roll].length === subCategory.questions.length) {
                        usedQuestions[roll] = [];
                    }

                    let randomIndex;
                    do {
                        randomIndex = Math.floor(Math.random() * subCategory.questions.length);
                    } while (usedQuestions[roll].includes(randomIndex));

                    usedQuestions[roll].push(randomIndex);
                    
                    cDisplay.innerText = subCategory.title;
                    cDisplay.style.background = "var(--color-couples)";
                    qDisplay.innerText = subCategory.questions[randomIndex];
                }
            }
        }, 250); // Updates exactly when the dice is flipped 180 degrees
    }

    function showShotScreen(qDisplay, cDisplay) {
        cDisplay.innerText = "זמן לשוט! 🥃";
        cDisplay.style.background = "var(--color-shot)"; 
        qDisplay.innerHTML = "<span class='shot-msg'>שותים שוט! 🥃</span>";
    }

    function handleSingleArrayMode(modeKey, dataObject, qDisplay, cDisplay, color) {
        if (usedQuestions[modeKey].length === dataObject.questions.length) {
            usedQuestions[modeKey] = [];
        }

        let randomIndex;
        do {
            randomIndex = Math.floor(Math.random() * dataObject.questions.length);
        } while (usedQuestions[modeKey].includes(randomIndex));

        usedQuestions[modeKey].push(randomIndex);
        
        cDisplay.innerText = dataObject.title;
        cDisplay.style.background = color;
        qDisplay.innerText = dataObject.questions[randomIndex];
    }
</script>
